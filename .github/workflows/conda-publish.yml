# This workflow builds and publishes a Conda package to btmartin721/snpio on Anaconda.org
# It is triggered by release tags, conda-only release tags, or manually.
name: Publish Conda Package to btmartin721/snpio

on:
  workflow_dispatch:
    inputs:
      upload_packages:
        description: 'Upload successful builds to Anaconda.org.'
        required: false
        type: boolean
        default: true
  push:
    tags:
      - "v*.*.*"
      - "conda-v*.*.*"

env:
  GIT_CONFIG_COUNT: "2"
  GIT_CONFIG_KEY_0: init.defaultBranch
  GIT_CONFIG_VALUE_0: master
  GIT_CONFIG_KEY_1: advice.detachedHead
  GIT_CONFIG_VALUE_1: "false"

# Define the jobs to be executed
jobs:
  build-and-upload:
    runs-on: "ubuntu-latest"
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Conda
        uses: conda-incubator/setup-miniconda@v4
        with:
          python-version: ${{ matrix.python-version }}
          miniforge-version: "latest"
          activate-environment: snpio-build
          channels: conda-forge,bioconda
          channel-priority: strict
          conda-remove-defaults: true
          auto-update-conda: true
          auto-activate: false
          environment-file: etc/environment.yml

      - name: Build Conda package
        shell: bash -el {0}
        env:
          CI: "1"
        run: |
          conda install --yes --override-channels -c conda-forge \
            conda-build anaconda-client
          set -o pipefail
          # conda-build reports this false positive for single-output recipes:
          # https://github.com/conda/conda-build/issues/5823
          conda-build recipe/ \
            --output-folder conda_build_artifacts \
            --python ${{ matrix.python-version }} --no-test 2>&1 |
            sed '/^WARNING: Number of parsed outputs does not match detected raw metadata blocks\./d'

      - name: Upload to Anaconda.org
        if: github.event_name == 'push' || inputs.upload_packages
        shell: bash -el {0}
        env:
          ANACONDA_API_TOKEN: ${{ secrets.SNPIO_UPLOAD_TOKEN }}
        run: |
          anaconda -t $ANACONDA_API_TOKEN upload \
            conda_build_artifacts/**/snpio-*.conda \
            --user btmartin721 --label main --force
