# This workflow automatically bumps the version of SNPio based on GitVersion,
# commits changes to the version files, and creates a GitHub release with the new version tag.
name: Auto Version and Tag SNPio Release

on:
  workflow_dispatch:
    inputs:
      manual_tag:
        description: 'Manually specify a version tag (e.g., 1.5.3). Leave blank to auto-generate.'
        required: false
        default: ''

permissions:
  actions: write
  contents: write

jobs:
  version-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup GitVersion
        uses: gittools/actions/gitversion/setup@v4.7.0
        with:
          versionSpec: '6.8.x'

      - name: Run GitVersion
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4.7.0

      - name: Determine version to use
        id: set_version
        env:
          GITVERSION_SEMVER: ${{ steps.gitversion.outputs.semVer }}
          MANUAL_TAG: ${{ inputs.manual_tag }}
        run: |
          VERSION="${MANUAL_TAG:-$GITVERSION_SEMVER}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Version must use MAJOR.MINOR.PATCH format."
            exit 1
          fi
          echo "Using version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Print version
        run: |
          echo "FullSemVer: ${{ steps.gitversion.outputs.fullSemVer }}"
          echo "SemVer:     ${{ steps.set_version.outputs.version }}"
          echo "Tag:        v${{ steps.set_version.outputs.version }}"

      - name: Set up Python 3.12
        uses: actions/setup-python@v7
        with:
          python-version: '3.12'

      - name: Install version update dependencies
        run: python -m pip install tomli-w pyyaml

      - name: Update version in pyproject.toml, meta.yaml, conf.py
        env:
          VERSION: ${{ steps.set_version.outputs.version }}
        run: python scripts/update_versions.py "$VERSION"

      - name: Install release validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]" build twine

      - name: Run warning-free unit tests
        run: python -m pytest -q

      - name: Build documentation with warnings as errors
        env:
          MPLCONFIGDIR: /tmp/snpio-mpl
          NUMBA_CACHE_DIR: /tmp/snpio-numba
        run: |
          python -m sphinx -E -a -W --keep-going -b html \
            snpio/docs/source /tmp/snpio-docs-html

      - name: Build and verify distributions
        run: |
          python -m build
          python -m twine check dist/*

      - name: Push version commit and tag atomically
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add pyproject.toml recipe/meta.yaml snpio/docs/source/conf.py
          git commit -m "chore: bump version to ${{ steps.set_version.outputs.version }}"

          if git rev-parse --verify --quiet \
            "refs/tags/v${{ steps.set_version.outputs.version }}"; then
            echo "::error::Tag v${{ steps.set_version.outputs.version }} already exists."
            exit 1
          fi

          git tag "v${{ steps.set_version.outputs.version }}"
          git push --atomic origin \
            HEAD:master "refs/tags/v${{ steps.set_version.outputs.version }}"
          echo "v${{ steps.set_version.outputs.version }}" > .version_tag

      - name: Set tag name output
        id: read_tag
        run: echo "tag_name=$(cat .version_tag)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.read_tag.outputs.tag_name }}
          name: Release ${{ steps.read_tag.outputs.tag_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Dispatch package publishing workflows
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run pypi-docker-publish.yml \
            --ref "${{ steps.read_tag.outputs.tag_name }}"
          gh workflow run conda-publish.yml \
            --ref "${{ steps.read_tag.outputs.tag_name }}"
