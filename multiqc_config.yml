title: "SNPio MultiQC Report"
subtitle: "Results from an analysis using the SNPio Python API"
custom_logo: "snpio/img/snpio_logo.png"
custom_logo_url: "https://github.com/btmartin721/SNPio/blob/master/snpio/img/snpio_logo.png"
custom_logo_title: "SNPio: A Python API for Population Genomics"
max_table_rows: 2000
intro_text: >
  SNPio summarizes filtering, missingness, diversity, population structure,
  genetic differentiation, introgression, linkage disequilibrium, and
  LD-based effective population size. Interpret estimates using the sampling,
  locus-independence, and resampling assumptions described for each panel.

show_analysis_paths: false
custom_logo_width: 180

custom_plot_config:
  linkage_disequilibrium_barplot:
    sort_samples: false
    tt_decimals: 5
  linkage_disequilibrium_heatmap:
    tt_decimals: 5
  linkage_disequilibrium_linegraph:
    tt_decimals: 5
  linkage_disequilibrium_barplot_Ne:
    sort_samples: false
    tt_decimals: 0

# -----------------------------------------------------------------------------
# Report section order
#
# MultiQC sections are ordered by their report anchors. Lower values appear
# earlier within the SNPio module. Gaps leave room for future panels.
# -----------------------------------------------------------------------------
report_section_order:
  # Overview
  population_counts:
    order: 100
  genotype_distribution:
    order: 110
  summary_statistics:
    order: 120
  allele_summary:
    order: 130

  # Filtering
  sankey_html:
    order: 200
  filtering_results_combined:
    order: 210
  filtering_results_missing_loci_samples_plotly:
    order: 220
  filtering_results_missing_population_plotly:
    order: 230
  mac_thresholds:
    order: 240
  maf_thresholds:
    order: 250
  boolean_thresholds:
    order: 260

  # Missing Data
  missing_summary:
    order: 300
  missingness_report:
    order: 310
  individual_missingness:
    order: 320
  locus_missingness:
    order: 330
  population_missingness:
    order: 340
  population_locus_missingness:
    order: 350

  # Population Structure
  pca_missingness:
    order: 400
  pca_missingness_scatter:
    order: 410

  # Linkage Disequilibrium and Effective Population Size
  linkage_disequilibrium_summary:
    order: 500
  linkage_disequilibrium_barplot:
    order: 510
  linkage_disequilibrium_boxplot:
    order: 520
  linkage_disequilibrium_heatmap:
    order: 530
  linkage_disequilibrium_linegraph:
    order: 540
  linkage_disequilibrium_barplot_Ne:
    order: 550
  linkage_disequilibrium_boxplot_Ne:
    order: 560
  linkage_disequilibrium_heatmap_Ne:
    order: 570
  linkage_disequilibrium_linegraph_Ne:
    order: 580

  # Genetic Differentiation
  wc_fst_observed:
    order: 600
  wc_fst_bootstrap_observed:
    order: 610
  wc_fst_bootstrap_ci95:
    order: 620
  wc_fst_permutation_observed:
    order: 630
  wc_fst_permutation_pvalues:
    order: 640
  nei_observed:
    order: 650
  nei_permutation_observed:
    order: 660
  nei_permutation_pvalues:
    order: 670
  nei_bootstrap_mean:
    order: 680
  nei_bootstrap_ci95:
    order: 690
  pairwise_nei_distances:
    order: 700
  pairwise_nei_distance_pvalues:
    order: 710
  pairwise_nei_distance_ci95:
    order: 720

  # Introgression: Patterson's D
  d_statistics_heatmap_patterson:
    order: 800
  d_statistics_significance_counts_table_patterson:
    order: 810
  d_statistics_significance_counts_plot_patterson:
    order: 820
  dstat_stacked_significance_barplot_patterson:
    order: 830
  d_statistics_z_distribution_patterson_d:
    order: 840
  dstat_pvalue_distribution_patterson:
    order: 850
  dstat_chi_square_distribution_patterson:
    order: 860

  # Introgression: Partitioned D
  d_statistics_heatmap_partitioned:
    order: 900
  d_statistics_significance_counts_table_partitioned:
    order: 910
  d_statistics_significance_counts_plot_partitioned:
    order: 920
  dstat_stacked_significance_barplot_partitioned:
    order: 930
  d_statistics_z_distribution_partitioned_D1:
    order: 940
  d_statistics_z_distribution_partitioned_D2:
    order: 950
  d_statistics_z_distribution_partitioned_D12:
    order: 960
  dstat_pvalue_distribution_partitioned:
    order: 970
  dstat_chi_square_distribution_partitioned:
    order: 980

  # Introgression: DFOIL D
  d_statistics_heatmap_dfoil:
    order: 1000
  d_statistics_significance_counts_table_dfoil:
    order: 1010
  d_statistics_significance_counts_plot_dfoil:
    order: 1020
  dstat_stacked_significance_barplot_dfoil:
    order: 1030
  d_statistics_z_distribution_dfoil_DFO:
    order: 1040
  d_statistics_z_distribution_dfoil_DIL:
    order: 1050
  d_statistics_z_distribution_dfoil_DFI:
    order: 1060
  d_statistics_z_distribution_dfoil_DOL:
    order: 1070
  dstat_pvalue_distribution_dfoil:
    order: 1080
  dstat_chi_square_distribution_dfoil:
    order: 1090

  # Diversity Statistics
  summary_statistics_overall:
    order: 1200
  summary_statistics_per_population_pi:
    order: 1210
  summary_statistics_per_population_ho:
    order: 1220
  summary_statistics_per_population_he:
    order: 1230

  # Outlier Detection
  fst_outliers_dbscan_method:
    order: 1300
  fst_outliers_permutation_method:
    order: 1310

  # Logs and Diagnostics
  verbose:
    order: 1400
  debug:
    order: 1410

# -----------------------------------------------------------------------------
# Remove sections from final report
# -----------------------------------------------------------------------------
remove_sections:
  - verbose
  - debug
